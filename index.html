<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="color-scheme" content="light">
<title>good times dashboard</title>
<style>
:root{
  color-scheme:light;
  --bg:#FAFAF8; --card:#FFFFFF; --ink:#1E2A23; --muted:#5F6E64;
  --line:#E4E7E2; --accent:#0F6657; --on-accent:#FFFFFF; --crit:#C43D3D;
}
body{margin:0;min-height:100vh;display:flex;align-items:center;
  justify-content:center;background:var(--bg);color:var(--ink);
  font:15px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:34px 30px;width:min(92vw,360px);text-align:center}
.brand{font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-size:24px;font-weight:800;color:var(--accent);letter-spacing:-.02em}
p{color:var(--muted);font-size:13.5px;margin:8px 0 20px}
input{width:100%;box-sizing:border-box;padding:11px 12px;font:inherit;
  border:1px solid var(--line);border-radius:10px;margin-bottom:12px;
  background:var(--card);color:var(--ink)}
input:focus-visible{outline:2px solid var(--accent);outline-offset:1px;
  border-color:var(--accent)}
button{width:100%;padding:11px;font:inherit;font-weight:700;
  color:var(--on-accent);background:var(--accent);border:0;
  border-radius:10px;cursor:pointer}
button:active{transform:scale(.98)}
button:disabled{opacity:.6;cursor:wait}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.err{color:var(--crit);font-size:13px;min-height:18px;margin-top:10px}
</style>
</head>
<body>
<div class="card">
  <div class="brand">good times</div>
  <p>This dashboard is private. Enter the password to view it.</p>
  <form id="f">
    <input type="password" id="pw" placeholder="Password" autofocus
           autocomplete="current-password" aria-label="Password">
    <button type="submit" id="btn">Unlock</button>
  </form>
  <div class="err" id="err" role="alert"></div>
</div>

function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)})}
async function unlock(pw){
  var enc=new TextEncoder();
  var mat=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},
    mat,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(CT));

}
async function attempt(pw,silent){
  var btn=document.getElementById("btn"),err=document.getElementById("err");
  btn.disabled=true;err.textContent="";
  try{
    var html=await unlock(pw);
    try{sessionStorage.setItem("gt-dash-pw",pw)}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    btn.disabled=false;
    if(!silent){err.textContent="Wrong password. Try again."}
  }
}
document.getElementById("f").addEventListener("submit",function(ev){
  ev.preventDefault();
  attempt(document.getElementById("pw").value,false);
});

  var saved=sessionStorage.getItem("gt-dash-pw");
  if(saved){attempt(saved,true)}
